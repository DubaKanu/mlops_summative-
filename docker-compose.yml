version: '3.8'

services:
  web:
    build: .
    container_name: potato-disease-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    restart: always
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

  api:
    build: .
    container_name: potato-disease-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always

  locust:
    build: .
    container_name: potato-disease-locust
    ports:
      - "8089:8089"
    command: locust -f locustfile.py --host=http://api:8000
    depends_on:
      - api
    restart: always