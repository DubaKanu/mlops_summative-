services:
  - type: web
    name: mlops-summative-ui
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: ./start.sh
    envVars:
      - key: API_URL
        value: http://localhost:8000
      - key: MODEL_PATH
        value: models/plant_disease_model.h5
      - key: DATA_DIR
        value: data/train
